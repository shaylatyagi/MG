<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://w3.org' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%234f46e5'/><text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-size='18' font-family='Arial,sans-serif' font-weight='bold' fill='white'>M</text></svg>" />
    <!-- FIXED: Removed user-scalable restrictions to fix the accessibility score -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="description" content="MobilityGrid — Fleet Operating System for India" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MobilityGrid" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" id="mg-manifest" />
    <script>
      // Switch manifest based on role (driver gets green manifest)
      (function() {
        var path = window.location.pathname + window.location.search;
        var isDriver = path.includes('role=driver') || path.includes('/driver/');
        var stored = '';
        try { stored = localStorage.getItem('user'); } catch(e) {}
        if (!isDriver && stored) {
          try { var u = JSON.parse(stored); isDriver = u.role === 'DRIVER'; } catch(e) {}
        }
        if (isDriver) {
          var el = document.getElementById('mg-manifest');
          if (el) el.setAttribute('href', '/driver-manifest.json');
          var tc = document.querySelector('meta[name="theme-color"]');
          if (tc) tc.setAttribute('content', '#16a34a');
        }
      })();
    </script>
    <!-- FIXED: Added cross-origin performance flag for faster font loading -->
    <link rel="preconnect" href="https://googleapis.com" />
    <link rel="preconnect" href="https://gstatic.com" crossorigin />
    <link href="https://googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
    <title>MobilityGrid</title>
    <script>
      // Enable Tailwind dark mode via class strategy
      tailwind = window.tailwind || {};
      window.tailwindConfig = { darkMode: 'class' };
      // Apply saved theme before page renders (no flash)
      (function() {
        try {
          if (localStorage.getItem('mg_theme') === 'dark') {
            document.documentElement.classList.add('dark');
          }
        } catch(e) {}
      })();
    </script>
    <!-- FIXED: Added defer to Tailwind script so it doesn't block the initial page render (fixes the 4.0s FCP) -->
    <script src="https://tailwindcss.com" defer></script>
    <script>
      // Apply dark mode config after Tailwind loads
      if (window.tailwind && window.tailwind.config) {
        tailwind.config = { darkMode: 'class' };
      }
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <!-- FIXED: Wrapped the root mount point inside a main landmark tag for screen readers -->
    <main>
      <div id="root"></div>
    </main>
  </body>
</html>
