<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/png" href="%PUBLIC_URL%/favicon.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="description" content="MobilityGrid — Fleet Operating System for India" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MobilityGrid" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" id="mg-manifest" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
  // Switch manifest based on role (driver gets green manifest)
  (function() {
    var pathname = window.location.pathname;
var search = window.location.search;
    var isDriver = false;
if (search.includes('role=driver')) { isDriver = true; }
else if (pathname.startsWith('/driver')) { isDriver = true; }
else if (pathname.startsWith('/owner') || pathname === '/login' || pathname === '/') { isDriver = false; }
else {
  try { var u = JSON.parse(localStorage.getItem('user') || '{}'); if (u && u.role === 'DRIVER') isDriver = true; } catch(e) {}
}
    if (isDriver) {
      var el = document.getElementById('mg-manifest');
      if (el) el.setAttribute('href', '/driver-manifest.json');
      var tc = document.querySelector('meta[name="theme-color"]');
      if (tc) tc.setAttribute('content', '#16a34a');
    }
  })();
</script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://mg-qw5s.onrender.com" />
    <link rel="preconnect" href="https://mg-qw5s.onrender.com" crossorigin />
    <link rel="preload" href="%PUBLIC_URL%/logos/logo-cyan.png" as="image" type="image/png" fetchpriority="high" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
    </noscript>
    <title>MobilityGrid</title>
    <script>
      // Dark mode: apply saved theme before paint (no flash) + init Tailwind config
      (function() {
        try { if (localStorage.getItem('mg_theme') === 'dark') document.documentElement.classList.add('dark'); } catch(e) {}
        window.tailwindConfig = { darkMode: 'class' };
        if (window.tailwind && window.tailwind.config) tailwind.config = { darkMode: 'class' };
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
